<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Route Optimizer - Model 5 UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f2efe7;
      --ink: #14281d;
      --card: rgba(255, 251, 240, 0.82);
      --accent: #188b5a;
      --accent-2: #0c5f45;
      --line: #b9c7b6;
      --warn: #bc450e;
      --ok: #156f4b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Space Grotesk", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1400px 500px at 10% -10%, #e6d8a9 10%, transparent 60%),
        radial-gradient(1200px 600px at 95% 10%, #cbe7d8 12%, transparent 65%),
        linear-gradient(160deg, #f6f3ea 0%, #eef3e2 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .shell {
      width: min(920px, 100%);
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--card);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(20, 40, 29, 0.18);
      overflow: hidden;
      animation: rise .55s ease-out;
    }

    .top {
      padding: 34px 30px 20px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(110deg, rgba(24, 139, 90, .12), rgba(12, 95, 69, .03));
    }

    h1 {
      margin: 0;
      font-family: "Fraunces", serif;
      font-size: clamp(1.9rem, 3.5vw, 2.8rem);
      letter-spacing: 0.01em;
      line-height: 1.06;
    }

    .subtitle {
      margin: 10px 0 0;
      font-size: 1rem;
      opacity: .85;
      max-width: 65ch;
    }

    form {
      display: grid;
      gap: 14px;
      padding: 24px 30px 30px;
    }

    label {
      font-size: .88rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent-2);
      margin-bottom: 6px;
      display: inline-block;
    }

    .input-wrap {
      animation: fadeUp .45s ease both;
    }

    .input-wrap:nth-child(2) { animation-delay: .06s; }
    .input-wrap:nth-child(3) { animation-delay: .12s; }
    .input-wrap:nth-child(4) { animation-delay: .18s; }

    input {
      width: 100%;
      padding: 14px 14px;
      border-radius: 12px;
      border: 1px solid #a5b5a9;
      font-size: 1rem;
      font-family: "Space Grotesk", sans-serif;
      background: rgba(255, 255, 255, .88);
      color: var(--ink);
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(24, 139, 90, .16);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      margin-top: 4px;
    }

    button {
      border: none;
      border-radius: 12px;
      background: linear-gradient(140deg, var(--accent), var(--accent-2));
      color: #fff;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 14px 26px;
      cursor: pointer;
      transition: transform .16s ease, filter .16s ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.03); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: .6; cursor: wait; }

    .status {
      font-size: .95rem;
      min-height: 1.5em;
    }

    .status.error { color: var(--warn); }
    .status.ok { color: var(--ok); }

    .result {
      margin-top: 8px;
      border: 1px dashed #9eb4a4;
      border-radius: 12px;
      padding: 14px;
      background: rgba(255, 255, 255, .6);
      display: none;
    }

    .result.visible { display: block; }

    .result h2 {
      margin: 0 0 10px;
      font-family: "Fraunces", serif;
      font-size: 1.25rem;
    }

    .route-list {
      margin: 8px 0 14px;
      padding-left: 20px;
      line-height: 1.6;
    }

    .map-link {
      display: inline-block;
      font-weight: 700;
      color: var(--accent-2);
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
      word-break: break-word;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 740px) {
      .top { padding: 24px 18px 16px; }
      form { padding: 18px; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="top">
      <h1>Route Optimizer</h1>
      <p class="subtitle">
        Enter exactly 4 locations. Click GO to run the Model 5 routing flow and get the best route as a Google Maps link.
      </p>
    </section>

    <form id="routeForm">
      <div class="input-wrap">
        <label for="loc1">Location 1 (start and end)</label>
        <input id="loc1" name="loc1" placeholder="Kamerlingh Onnesweg 9, Dordrecht" required>
      </div>

      <div class="input-wrap">
        <label for="loc2">Location 2</label>
        <input id="loc2" name="loc2" placeholder="Address or city" required>
      </div>

      <div class="input-wrap">
        <label for="loc3">Location 3</label>
        <input id="loc3" name="loc3" placeholder="Address or city" required>
      </div>

      <div class="input-wrap">
        <label for="loc4">Location 4</label>
        <input id="loc4" name="loc4" placeholder="Address or city" required>
      </div>

      <div class="actions">
        <button id="goBtn" type="submit">GO</button>
        <div id="status" class="status" aria-live="polite"></div>
      </div>

      <section id="result" class="result" aria-live="polite">
        <h2>Best Route</h2>
        <div id="distance"></div>
        <ol id="routeList" class="route-list"></ol>
        <a id="mapsLink" class="map-link" href="#" target="_blank" rel="noopener noreferrer">Open route in Google Maps</a>
      </section>
    </form>
  </main>

  <script>
    const form = document.getElementById("routeForm");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const distanceEl = document.getElementById("distance");
    const routeListEl = document.getElementById("routeList");
    const mapsLinkEl = document.getElementById("mapsLink");
    const goBtn = document.getElementById("goBtn");

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = `status ${type}`.trim();
    }

    function resetResult() {
      resultEl.classList.remove("visible");
      routeListEl.innerHTML = "";
      distanceEl.textContent = "";
      mapsLinkEl.href = "#";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      resetResult();

      const locations = [
        form.loc1.value.trim(),
        form.loc2.value.trim(),
        form.loc3.value.trim(),
        form.loc4.value.trim(),
      ];

      if (locations.some((value) => !value)) {
        setStatus("Please fill all 4 location fields.", "error");
        return;
      }

      goBtn.disabled = true;
      setStatus("Running Model 5 route optimization...", "");

      try {
        const response = await fetch("/api/route", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ locations }),
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || "Could not calculate route");
        }

        distanceEl.textContent = `Estimated total distance: ${data.total_distance_km} km`;

        data.ordered_locations.forEach((loc) => {
          const li = document.createElement("li");
          li.textContent = loc;
          routeListEl.appendChild(li);
        });

        mapsLinkEl.href = data.maps_link;
        resultEl.classList.add("visible");
        setStatus("Route calculated successfully.", "ok");
      } catch (error) {
        setStatus(error.message || "Unexpected error", "error");
      } finally {
        goBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
